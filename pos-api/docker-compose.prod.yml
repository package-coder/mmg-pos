
services:
  app-prod:
    image: chrisn0tdev/pos-client
    ports:
      - 3000:5173
    depends_on:
      - proxy-prod
    # env_file: 
    #   - .env
    environment:
      - VITE_APP_VERSION=MMG POS version 0001
      - VITE_APP_BASE_NAME=/
      - VITE_APP_SERVER_URL=http://proxy:6001
      - VITE_APP_SERVER_PORT=6001
      - VITE_APP_ENV=internal-production
    restart: always
    
  server-prod:
    build: ./
    image: chrisn0tdev/pos-app
    ports:
      - 6000:5000
    # depends_on:
    #   - mongo
    networks:
      - pos-network
    # env_file: 
    #   - .env
    environment:
      - APP_VERSION=MMG POS version 0001
      - MONGO_HOST_PY=54.210.228.111
      - MONGO_PORT=27017
      - MONGO_USER=mmg_admin1
      - MONGO_PASS=mmgadmin1234
      - JWT_SECRET_KEY=eec96ad2524e71caacb54e9061178f512867998d8980fccdea34274629e0762b
      # - HOST=0.0.0.0
      # - PORT=5000
      - DATABASE=pos
      - REMOTE_DATABASE_URL=mongodb://mmg_admin1:mmgadmin1234@54.210.228.111?authSource=pos
      - APP_ENV=production
    restart: always
  proxy-prod:
    build: ./proxy
    image: chrisn0tdev/pos-proxy
    # device_cgroup_rules:
    #   - c *:* rmw
    volumes:
      - /dev:/dev
    # devices:
    #   - /dev/ttyS3
    ports:
      - 6001:5001 
    depends_on:
      # - mongo
      - server-prod
    networks:
      - pos-network
    # env_file: 
    #   - .env
    privileged: true
    environment:
      - LOCAL_SERVER_URL=http://server:6000
      - CLOUD_SERVER_URL=http://54.210.228.111:5000
    restart: always

  sync-prod:
    build: ./sync
    image: chrisn0tdev/pos-sync
    # depends_on:
    #   - mongo
    networks:
      - pos-network
    # env_file: 
    #   - .env
    environment:
      - LOCAL_SERVER_URL=http://server:6000
      - CLOUD_SERVER_URL=http://54.210.228.111:5000
    restart: always


  # mongo:
  #   image: mongo
  #   ports:
  #     - 27018:27017 
  #   volumes:
  #     - mongo-data:/data/db
  #   networks:
  #     - pos-network
  #   restart: always

networks:
  pos-network:
    driver: bridge
