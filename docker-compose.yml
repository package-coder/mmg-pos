# Internal LAN deployment — local MongoDB, all services on one machine
# Run:  docker-compose up --build
# Ports exposed to host:
#   8000 → mmg-app  (frontend)
#   8001 → server   (Flask API, debug only — not needed externally)
#   8002 → proxy    (API entry point for the browser)
#   8003 → mongo    (MongoDB, debug only)

services:

  # ─── Frontend ──────────────────────────────────────────────────────────────
  app:
    build: ./mmg-app
    image: chrisn0tdev/pos-client
    ports:
      - "8000:5173"
    depends_on:
      - proxy
    environment:
      - VITE_APP_ENV=internal-production
      - VITE_APP_BASE_NAME=/
      # Browser connects to the proxy through the host-mapped port
      - VITE_APP_SERVER_PORT=8002
    restart: always

  # ─── Flask API ─────────────────────────────────────────────────────────────
  server:
    build: ./pos-api
    image: chrisn0tdev/pos-app
    ports:
      - "8001:5100"
    depends_on:
      - mongo
    networks:
      - pos-network
    env_file:
      - pos-api/.env
    environment:
      - LOCAL_DATABASE_URL=mongodb://mongo:27017
      - APP_ENV=internal-production
    restart: always

  # ─── Proxy (API gateway + legacy print/display HTTP endpoints) ─────────────
  proxy:
    build: ./pos-api/proxy
    image: chrisn0tdev/pos-proxy
    volumes:
      - /dev:/dev          # expose serial/USB devices for VFD display
    ports:
      - "8002:5001"
    depends_on:
      - mongo
      - server
    networks:
      - pos-network
    env_file:
      - pos-api/.env
    privileged: true       # required for serial port access
    environment:
      - LOCAL_DATABASE_URL=mongodb://mongo:27017
      - LOCAL_SERVER_URL=http://server:5100
    restart: always

  # ─── Data sync (local ↔ remote MongoDB) ────────────────────────────────────
  sync:
    build: ./pos-api/sync
    image: chrisn0tdev/pos-sync
    depends_on:
      - mongo
    networks:
      - pos-network
    env_file:
      - pos-api/.env
    environment:
      - LOCAL_DATABASE_URL=mongodb://mongo:27017
    restart: always

  # ─── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "8003:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - pos-network
    restart: always

networks:
  pos-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
